defaults:
  - hybrid_engines/fsdp@actor.fsdp_config
  - model/dreamzero_5b@actor.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "droid_sft_dreamzero_5b"
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: -1
  max_steps: 100000  # paper: 100K steps for DROID
  val_check_interval: -1
  save_interval: 2000
  log_interval: 10

  resume_dir: null

data:
  train_data_paths: /iag_ad_01/ad/xiejinxia/data/DreamZero-DROID-Data
  lazy_load: True
  num_workers: 4
  prefetch_factor: 8
  video_tolerance_s: 0.1
  parquet_cache_size: 512
  sampling_mode: multi_anchor
  video_backend: decord

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 8  # paper: 128 (multi-GPU); single H20: 8 (gradient accum 8x)
  seed: 42
  enable_offload: False

  model:
    model_type: "dreamzero"
    precision: fp32
    # 从 WAN2.2-TI2V-5B 组件冷启动，没有现成 5B DROID checkpoint
    model_path: null
    tokenizer_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/Wan2.2-TI2V-5B/google/umt5-xxl
    diffusion_model_pretrained_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/Wan2.2-TI2V-5B
    image_encoder_pretrained_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth
    text_encoder_pretrained_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/Wan2.2-TI2V-5B/models_t5_umt5-xxl-enc-bf16.pth
    vae_pretrained_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/Wan2.2-TI2V-5B/Wan2.2_VAE.pth
    metadata_json_path: /iag_ad_01/ad/xiejinxia/code/test/dreamzero/checkpoints/dreamzero_droid_wan22_sanity/experiment_cfg/metadata.json

    action_dim: 32
    action_horizon: 24
    state_horizon: 1
    num_action_per_block: 24
    target_video_height: 176
    target_video_width: 320

    embodiment_tag: "oxe_droid"
    relative_action: True
    relative_action_per_horizon: False
    relative_action_keys:
      - joint_position
    is_lora: False
    load_to_device: False

  optim:
    lr: 1.0e-5
    adam_beta1: 0.95
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 1.0e-5
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: -1
    lr_warmup_steps_ratio: 0.01
    total_training_steps: ${runner.max_steps}

  fsdp_config:
    strategy: "fsdp2"
    sharding_strategy: "full_shard"
    use_orig_params: True
    gradient_checkpointing: True
    gradient_checkpointing_use_reentrant: True
    limit_all_gathers: True
    reshard_after_forward: True
    save_full_model_weights: False
    grad_scaler:
      enabled: False
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16
    amp_autocast:
      enabled: false
      precision: "bf16"
